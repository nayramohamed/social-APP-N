<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full max-w-lg p-8">

        <div class="flex items-start gap-4 mb-8">
            <div class="bg-blue-50 p-3 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Change Password</h2>
                <p class="text-gray-500 text-sm mt-1">Keep your account secure by using a strong password.</p>
            </div>
        </div>

        <form [formGroup]="changePasswordForm" (ngSubmit)="updatePassword()" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Current password</label>
                <input type="password" placeholder="Enter current password" formControlName="password"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50/30 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all placeholder:text-gray-400">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">New password</label>
                <input type="password" formControlName="newPassword" placeholder="Enter new password"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50/30 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all placeholder:text-gray-400">
                <p class="text-[12px] text-gray-500 mt-2 ml-1">At least 8 characters with uppercase, lowercase, number,
                    and special character.</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Confirm new password</label>
                <input type="password" formControlName="rePassword" placeholder="Re-enter new password"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50/30 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all placeholder:text-gray-400">
            </div>

            <button type="submit"
                class="w-full cursor-pointer bg-[#70acef] hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-md shadow-blue-100 transition-colors duration-200 mt-4">
                Update password
            </button>
        </form>
    </div>
</div>
