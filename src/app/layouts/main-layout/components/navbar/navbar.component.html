<nav class="bg-neutral-primary w-full z-20 top-0 start-0 border-b border-default">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-2">
        <a class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="/assets/route.png" class="h-8 rounded" alt="Route Logo" />
            <span class="self-center text-xl text-heading font-semibold whitespace-nowrap">Route Posts</span>
        </a>

        <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
            <div class="relative inline-block">

                <button type="button"
                    class="flex items-center gap-2 pl-1 pr-3 py-1 bg-slate-50 border border-slate-200 rounded-full hover:bg-slate-100 focus:outline-none focus:ring-4 focus:ring-slate-200 transition-colors w-full"
                    id="user-menu-button" aria-expanded="false" data-dropdown-toggle="user-dropdown"
                    data-dropdown-placement="bottom">

                    <span class="sr-only">Open user menu</span>
                    <img class="w-8 h-8 rounded-full object-cover" [src]="userImage" [alt]="userName" />
                    <span class="font-medium text-slate-700 text-sm whitespace-nowrap">{{userName}}</span>

                    <svg class="w-4 h-4 text-slate-500 ml-auto" fill="none" stroke="currentColor" stroke-width="2"
                        viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>

                <div class="z-50 hidden bg-white border border-slate-200 rounded-2xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] absolute top-full left-0 mt-2 w-full"
                    id="user-dropdown">
                    <ul class="p-2 text-sm text-slate-600 font-medium" aria-labelledby="user-menu-button">

                        <li class="mb-1">
                            <a routerLink="/profile" routerLinkActive="bg-slate-100 text-slate-900"
                                data-dropdown-hide="user-dropdown"
                                class="inline-flex items-center w-full px-3 py-2 hover:bg-slate-100 hover:text-slate-900 rounded-lg transition-colors cursor-pointer">
                                <i class="fa-solid fa-user text-slate-500 w-5 mr-2"></i> Profile
                            </a>
                        </li>

                        <li>
                            <a routerLink="/change" routerLinkActive="bg-slate-100 text-slate-900"
                                data-dropdown-hide="user-dropdown"
                                class="inline-flex items-center w-full px-3 py-2 hover:bg-slate-100 hover:text-slate-900 rounded-lg transition-colors cursor-pointer">
                                <i class="fa-solid fa-gear text-slate-500 w-5 mr-2"></i> Settings
                            </a>
                        </li>

                        <hr class="my-1.5 border-slate-200">

                        <li>
                            <a (click)="logOut()" data-dropdown-hide="user-dropdown"
                                class="inline-flex items-center w-full px-4 py-2 hover:bg-slate-100 text-red-600 hover:text-red-700 rounded-lg transition-colors cursor-pointer">
                                LogOut
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <button data-collapse-toggle="navbar-user" type="button"
                class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
                aria-controls="navbar-user" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
                </svg>
            </button>
        </div>

        <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-user">
            <ul
                class="font-medium flex flex-col p-4 md:p-1.5 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:bg-secondColor/60">
                <li>
                    <a routerLink="/feed" routerLinkActive="bg-white text-mainColor"
                        class="block py-2 px-3 text-gray-600 font-bold text-sm rounded md:p-1" aria-current="page">
                        <i class="fa-regular fa-house"></i> Feed</a>
                </li>
                <li>
                    <a routerLink="/profile" routerLinkActive="bg-white text-mainColor"
                        class="block py-2 px-3 text-gray-600 font-bold text-sm rounded md:p-1" aria-current="page">
                        <i class="fa-regular fa-user"></i> Profile</a>
                </li>
                <li>
                    <a routerLink="/notification" routerLinkActive="bg-white text-mainColor"
                        class="block py-2 px-3 text-gray-600 font-bold text-sm rounded md:p-1" aria-current="page">
                        <i class="fa-regular fa-comment"></i> Notification</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
